<div class="overlay" *ngIf="confirmService.state$ | async as state" (click)="respond(false)">
  <div class="dialog" (click)="$event.stopPropagation()">
    <h3>{{ state.title }}</h3>
    <p>{{ state.message }}</p>
    <div class="actions">
      <button class="btn cancel" (click)="respond(false)">Cancel</button>
      <button class="btn confirm" [class.danger]="state.danger" (click)="respond(true)">
        {{ state.confirmText }}
      </button>
    </div>
  </div>
</div>
