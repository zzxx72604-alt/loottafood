<button type="button" class="gs-trigger" (click)="toggle($event)">
  <span class="gs-label">{{ selectedLabel }}</span>
  <span class="gs-arrow" [class.up]="open">▾</span>
</button>
<div class="gs-menu" *ngIf="open">
  <button type="button" class="gs-opt" *ngFor="let o of options"
    [class.active]="o.value === value" (click)="choose(o)">
    <span>{{ o.label }}</span>
    <span class="gs-check" *ngIf="o.value === value">✓</span>
  </button>
</div>
