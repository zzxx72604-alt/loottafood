<div class="pay-wrap" *ngIf="!selected">
  <h3 class="pay-heading">Choose a payment method</h3>
  <div class="methods">
    <button class="method" *ngFor="let m of methods" (click)="choose(m)">
      <span class="logo" [style.background]="m.color">{{ m.short }}</span>
      <span class="m-name">{{ m.name }}</span>
      <span class="m-note">{{ m.note }}</span>
    </button>
  </div>
</div>

<div class="pay-card" *ngIf="selected">
  <div class="pay-head" [style.background]="selected.color">
    <span>{{ selected.name }}</span>
    <span class="amount">{{ order.totalPrice | currency }}</span>
  </div>

  <p class="scan-text">Open your {{ selected.name }} app and scan to pay</p>

  <div class="qr">
    <div class="qr-grid">
      <span *ngFor="let c of qrCells" [class.on]="c"></span>
    </div>
    <div class="qr-logo" [style.background]="selected.color">{{ selected.short }}</div>
  </div>

  <div class="ref">Reference: <strong>{{ reference }}</strong></div>

  <button class="confirm" (click)="confirm()" [disabled]="processing">
    {{ processing ? 'Processing…' : 'I have paid — Confirm' }}
  </button>
  <button class="cancel" (click)="cancel()" [disabled]="processing">
    Choose another method
  </button>
</div>
