<div class="qr-wrap">
  <app-title title="Scan to Order"></app-title>

  <div class="qr-card">
    <div class="brand">LoottaFood</div>
    <p class="tagline">Scan to browse the menu & order — dine-in or from home</p>

    <qrcode
      [qrdata]="orderUrl"
      [width]="240"
      [margin]="2"
      [elementType]="'canvas'"
      [errorCorrectionLevel]="'M'"
      [colorDark]="'#1a1a1a'"
      [colorLight]="'#ffffff'">
    </qrcode>

    <div class="url">{{ orderUrl }}</div>
  </div>

  <div class="qr-tools">
    <label>
      <span>Link the QR points to</span>
      <input type="text" [(ngModel)]="orderUrl" placeholder="http://localhost:4200" />
    </label>
    <div class="btn-row">
      <button class="dl-btn" (click)="downloadJpg()">⬇️ Download JPG</button>
      <button class="print-btn" (click)="print()">🖨️ Print</button>
    </div>
  </div>
</div>
