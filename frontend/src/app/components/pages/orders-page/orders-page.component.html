<div class="wrap">
  <app-title title="My Orders"></app-title>

  <p *ngIf="loading" class="msg">Loading your orders…</p>

  <div *ngIf="!loading && !orders.length" class="msg">
    <p>You have no orders yet.</p>
    <a routerLink="/">Start ordering →</a>
  </div>

  <div class="order-card" *ngFor="let order of orders">
    <div class="row top">
      <span class="status status-{{order.status}}">{{ order.status }}</span>
      <span class="date">{{ order.createdAt | date:'medium' }}</span>
    </div>

    <div class="thumbs">
      <img *ngFor="let item of order.items" [src]="item.food.imageUrl" [alt]="item.food.name" [title]="item.food.name"/>
    </div>

    <div class="row bottom">
      <span class="count">{{ itemCount(order) }} item(s)</span>
      <span class="total">{{ order.totalPrice | currency }}</span>
    </div>

    <div class="actions">
      <a class="track" routerLink="/track/{{order.id}}">Track</a>
      <button class="reorder" (click)="reorder(order)">Order again</button>
      <button class="delete" (click)="remove(order)">Delete</button>
    </div>
  </div>
</div>
