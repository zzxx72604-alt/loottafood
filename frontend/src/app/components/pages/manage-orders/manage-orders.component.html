<div class="mo-wrap">
  <app-title title="Manage Orders"></app-title>

  <p *ngIf="loading" class="msg">Loading orders…</p>
  <div *ngIf="!loading && !orders.length" class="msg">No orders yet.</div>

  <div class="order-card" *ngFor="let order of orders">
    <div class="row top">
      <span class="status status-{{order.status}}">{{ order.status }}</span>
      <span class="date">{{ order.createdAt | date:'medium' }}</span>
    </div>

    <div class="who">
      <strong>{{ order.name }}</strong>
      <span class="addr">{{ order.address }}</span>
    </div>

    <div class="thumbs">
      <img *ngFor="let item of order.items" [src]="item.food.imageUrl" [alt]="item.food.name" [title]="item.food.name + ' x' + item.quantity" />
    </div>

    <div class="row bottom">
      <span class="count">{{ itemCount(order) }} item(s)</span>
      <span class="total">{{ order.totalPrice | currency }}</span>
      <button class="deliver" *ngIf="order.status !== 'DELIVERED'" (click)="complete(order)">
        Mark Delivered
      </button>
      <span class="done" *ngIf="order.status === 'DELIVERED'">✓ Delivered</span>
    </div>
  </div>
</div>
